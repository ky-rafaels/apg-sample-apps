apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: takserver-httproute
  namespace: takserver
spec:
  parentRefs:
  - name: takserver-gateway
  hostnames:
  - takserver.example.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: takserver
      port: 8443