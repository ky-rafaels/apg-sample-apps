apiVersion: apps/v1
kind: Deployment
metadata:
  name: takserver-db
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: takserver-db
  template:
    metadata:
      labels:
        app: takserver-db
    spec:
      containers:
      - name: postgres
        image: {{ .Values.db.image }}
        env:
        - name: POSTGRES_DB
          value: tak
        - name: POSTGRES_USER
          value: tak
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: takserver-secrets
              key: db-password
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: db-data
          mountPath: /var/lib/postgresql/data
        command: ["/opt/tak/db-utils/configureInDocker.sh"]
      volumes:
      - name: db-data
        persistentVolumeClaim:
          claimName: takserver-db-pvc